name: Generate arcade contribution graph

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate contribution graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: NicolasPiccioni
          games: pacman
          player_style: opportunistic

      - name: Push SVGs
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
